<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AttendTrack - Mark Attendance</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="js/api.js"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563eb",
                        "error": "#dc2626",
                        "background": "#f8fafc",
                        "surface": "#ffffff",
                        "outline": "#94a3b8",
                        "on-surface": "#1e293b",
                        "on-background": "#0f172a",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "0.375rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        .scroll-custom::-webkit-scrollbar {
            width: 6px;
        }
        .scroll-custom::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .scroll-custom::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- Simple Top Header -->
<header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="how_to_reg">how_to_reg</span>
<h1 class="text-xl font-extrabold tracking-tight text-on-background">AttendTrack</h1>
</div>
<button id="logout-btn" class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-slate-600 hover:text-error transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="logout">logout</span>
        Logout
    </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 p-4 md:p-8 max-w-5xl mx-auto w-full space-y-6">
<!-- Header Selection Area -->
<section class="grid grid-cols-1 md:grid-cols-3 gap-6">
<!-- Branch Selector -->
<div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
<label class="block text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-2">Select Branch</label>
<div class="relative">
<select id="branch-select" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-4 pr-10 text-lg font-bold text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all appearance-none cursor-pointer">
<option value="">Select a branch...</option>
<option value="CSE">CSE (Computer Science)</option>
<option value="IT">IT (Information Technology)</option>
<option value="AIML">AIML (AI & Machine Learning)</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Date Display -->
<div class="bg-primary p-6 rounded-2xl shadow-lg shadow-primary/20 text-white flex flex-col justify-center">
<span class="text-[10px] font-bold uppercase tracking-widest opacity-80 mb-2 text-white/90">Session Date</span>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-3xl" data-icon="calendar_today">calendar_today</span>
<div>
<div class="text-xl font-bold leading-tight" id="date-display">Loading...</div>
<div class="text-xs font-medium opacity-80" id="date-info">Today</div>
</div>
</div>
</div>
</section>
<!-- Student Registry List -->
<section id="marking-section" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
<!-- List Header -->
<div class="px-6 py-4 bg-slate-50 border-b border-slate-200 flex items-center justify-end gap-3">
<span class="text-xs font-semibold text-slate-500">Quick Select:</span>
<button id="mark-all-present-btn" class="text-xs font-bold text-primary hover:underline">Mark all Present</button>
</div>
<div id="students-list" class="divide-y divide-slate-100 max-h-[500px] overflow-y-auto scroll-custom">
</div>
</section>
<!-- Submission Footer Section -->
<div id="submission-footer" class="flex flex-col md:flex-row items-center justify-between gap-6 pt-4 border-t border-slate-200">
<div class="flex gap-10">
<div class="text-center md:text-left">
<div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Recorded</div>
<div class="text-2xl font-black text-on-background"><span id="recorded-count">0</span> <span class="text-slate-400 font-bold">/ <span id="total-count">0</span></span></div>
</div>
<div class="flex gap-4">
<div class="text-center">
<div class="text-[10px] font-bold text-primary uppercase tracking-widest mb-1">Present</div>
<div class="text-xl font-bold" id="present-count">0</div>
</div>
<div class="text-center">
<div class="text-[10px] font-bold text-error uppercase tracking-widest mb-1">Absent</div>
<div class="text-xl font-bold text-error" id="absent-count">0</div>
</div>
</div>
</div>
<div class="flex items-center gap-4 w-full md:w-auto">
<button id="discard-draft-btn" class="flex-1 md:flex-none px-6 py-3 text-sm font-bold text-slate-500 hover:text-on-background transition-colors uppercase tracking-widest">Discard Draft</button>
<button id="complete-registry-btn" class="flex-1 md:flex-none bg-primary text-white px-10 py-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-lg shadow-primary/25 hover:bg-blue-700 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                Complete Registry
                <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>

<!-- Attendance Completion Summary -->
<div id="completion-summary" class="hidden">
<div class="mt-8 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
<div class="px-6 py-4 bg-gradient-to-r from-green-50 to-emerald-50 border-b border-green-200 flex items-center gap-3">
<span class="material-symbols-outlined text-green-600 text-3xl" data-icon="check_circle">check_circle</span>
<div>
<h3 class="text-lg font-bold text-green-900">Attendance Completed</h3>
<p class="text-sm text-green-700">Below is the summary of recorded attendance for all students</p>
</div>
</div>
<div id="completion-details" class="divide-y divide-slate-100 max-h-[600px] overflow-y-auto">
<!-- Student details populated by JavaScript -->
</div>
</div>
</div>
</main>

<div id="toast" class="hidden fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white font-semibold z-[100]"></div>

<script>
document.addEventListener('DOMContentLoaded', async function() {
  // Auth check
  window.API.checkAuth(['teacher', 'admin']);

  // State
  let currentBranch = null;
  let attendanceMap = {};
  let studentList = [];
  let attendanceCompleted = false;
  let studentAttendancePercentage = {};

  // UI Elements
  const branchSelect = document.getElementById('branch-select');
  const dateDisplay = document.getElementById('date-display');
  const studentsList = document.getElementById('students-list');
  const markAllPresentBtn = document.getElementById('mark-all-present-btn');
  const completeRegistryBtn = document.getElementById('complete-registry-btn');
  const discardDraftBtn = document.getElementById('discard-draft-btn');
  const logoutBtn = document.getElementById('logout-btn');
  const recordedCount = document.getElementById('recorded-count');
  const totalCount = document.getElementById('total-count');
  const presentCount = document.getElementById('present-count');
  const absentCount = document.getElementById('absent-count');
  const toast = document.getElementById('toast');
  const completionSummary = document.getElementById('completion-summary');
  const completionDetails = document.getElementById('completion-details');

  // Format date
  function formatDate(date) {
    const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
    return date.toLocaleDateString('en-US', options);
  }

  // Show today's date
  const today = new Date();
  dateDisplay.textContent = formatDate(today);

  // Calculate attendance percentage for a student
  async function calculateAttendancePercentage(studentId) {
    try {
      console.log('Fetching overall attendance for student:', studentId);
      // Get overall attendance for the student
      const authToken = window.API.getToken();
      // We need to temporarily switch context to get student's attendance
      // For now, we'll fetch from the student history endpoint
      const response = await window.API.call('/attendance/student/' + studentId, 'GET');
      console.log('Attendance response for student:', studentId, response);
      
      const percentage = response.totalPercentage !== undefined ? response.totalPercentage : 0;
      console.log('Calculated overall percentage for student:', studentId, percentage);
      return percentage;
    } catch (error) {
      console.error('Error fetching attendance history for student:', studentId, error);
      return 0;
    }
  }

  // Load students by branch
  async function loadStudents() {
    try {
      console.log('loadStudents called, currentBranch:', currentBranch);
      if (!currentBranch) {
        studentsList.innerHTML = '<div class="p-6 text-center text-slate-500">Please select a branch</div>';
        attendanceMap = {};
        updateCounter();
        completionSummary.classList.add('hidden');
        return;
      }
      
      // Fetch all students
      console.log('Fetching all users...');
      const allUsers = await window.API.users.getAll();
      console.log('All users fetched:', allUsers);
      
      // Filter for students in the selected branch
      console.log('Filtering students for branch:', currentBranch);
      studentList = allUsers.filter(u => {
        console.log(`Checking user: ${u.name}, role: ${u.role}, department: ${u.department}`);
        return u.role === 'student' && u.department === currentBranch;
      });
      console.log('Filtered studentList:', studentList);
      
      // Check if attendance already marked for this branch today
      try {
        console.log('Checking attendance status for branch:', currentBranch);
        const checkResult = await window.API.call('/attendance/check-branch/' + currentBranch, 'GET');
        console.log('Check result received:', checkResult);
        if (checkResult.completed) {
          console.log('Attendance already completed for this branch');
          attendanceCompleted = true;
          completionSummary.classList.remove('hidden');
          
          // Show already completed message
          studentsList.innerHTML = '';
          
          // Calculate attendance percentages for all students to show final summary
          studentAttendancePercentage = {};
          for (const student of studentList) {
            const percentage = await calculateAttendancePercentage(student._id);
            studentAttendancePercentage[student._id] = percentage;
          }
          
          // Show completion summary with all students
          showCompletionSummary();
          
          completeRegistryBtn.disabled = true;
          completeRegistryBtn.style.opacity = '0.5';
          completeRegistryBtn.style.cursor = 'not-allowed';
          
          // Hide marking section and submission footer
          const markingSection = document.getElementById('marking-section');
          if (markingSection) markingSection.style.display = 'none';
          const submissionFooter = document.getElementById('submission-footer');
          if (submissionFooter) submissionFooter.style.display = 'none';
          
          updateCounter();
          return;
        }
      } catch (error) {
        console.log('No existing attendance for today:', error.message);
        attendanceCompleted = false;
      }
      
      // Show marking section
      const markingSection = document.getElementById('marking-section');
      if (markingSection) markingSection.style.display = 'block';
      const submissionFooter = document.getElementById('submission-footer');
      if (submissionFooter) submissionFooter.style.display = 'flex';
      completionSummary.classList.add('hidden');
      
      // Calculate attendance percentages for all students
      studentAttendancePercentage = {};
      for (const student of studentList) {
        const percentage = await calculateAttendancePercentage(student._id);
        studentAttendancePercentage[student._id] = percentage;
      }
      console.log('All student attendance percentages calculated:', studentAttendancePercentage);
      
      // Initialize attendance map with all students set to absent
      attendanceMap = {};
      studentList.forEach(student => {
        attendanceMap[student._id] = 'absent';
      });
      
      renderStudents(studentList);
      updateCounter();
    } catch (error) {
      console.error('Error in loadStudents:', error);
      showToast(error.message, 'error');
    }
  }

  // Render students
  function renderStudents(students) {
    studentsList.innerHTML = '';
    if (students.length === 0) {
      studentsList.innerHTML = '<div class="p-6 text-center text-slate-500">No students enrolled</div>';
      return;
    }
    students.forEach(student => {
      const row = document.createElement('div');
      row.className = 'p-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4 hover:bg-slate-50/50 transition-colors';
      const initials = (student.name || 'U').split(' ').map(n => n[0]).join('').toUpperCase();
      const attendanceStatus = attendanceMap[student._id];
      const percentage = studentAttendancePercentage[student._id] !== undefined ? studentAttendancePercentage[student._id] : 0;
      const percentageDisplay = `${percentage}%`;
      row.innerHTML = `
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold">${initials}</div>
          <div>
            <h4 class="font-bold text-on-surface">${student.name}</h4>
            <p class="text-sm text-slate-500 font-medium">ID: ${student.studentId || 'N/A'} <span class="text-primary font-semibold">${percentageDisplay}</span></p>
          </div>
        </div>
        <div class="flex items-center bg-slate-100 p-1 rounded-lg">
          <button class="present-btn-${student._id} flex items-center gap-2 px-6 py-2.5 rounded-md text-xs font-bold uppercase tracking-wider transition-all ${attendanceStatus === 'present' ? 'bg-primary text-white shadow-sm' : 'text-slate-500 hover:text-primary'}">
            <span class="material-symbols-outlined text-sm" data-icon="check">check</span>Present
          </button>
          <button class="absent-btn-${student._id} flex items-center gap-2 px-6 py-2.5 rounded-md text-xs font-bold uppercase tracking-wider transition-all ${attendanceStatus === 'absent' ? 'bg-error text-white shadow-sm' : 'text-slate-500 hover:text-error'}">
            <span class="material-symbols-outlined text-sm" data-icon="close">close</span>Absent
          </button>
        </div>
      `;
      const presentBtn = row.querySelector('.present-btn-' + student._id);
      const absentBtn = row.querySelector('.absent-btn-' + student._id);
      presentBtn.addEventListener('click', () => markStudent(student._id, 'present'));
      absentBtn.addEventListener('click', () => markStudent(student._id, 'absent'));
      studentsList.appendChild(row);
    });
  }

  // Mark student
  function markStudent(studentId, status) {
    attendanceMap[studentId] = status;
    // Update button states
    const presentBtn = document.querySelector('.present-btn-' + studentId);
    const absentBtn = document.querySelector('.absent-btn-' + studentId);
    if (status === 'present') {
      presentBtn.className = 'present-btn-' + studentId + ' flex items-center gap-2 px-6 py-2.5 rounded-md text-xs font-bold uppercase tracking-wider transition-all bg-primary text-white shadow-sm';
      absentBtn.className = 'absent-btn-' + studentId + ' flex items-center gap-2 px-6 py-2.5 rounded-md text-xs font-bold uppercase tracking-wider transition-all text-slate-500 hover:text-error';
    } else {
      presentBtn.className = 'present-btn-' + studentId + ' flex items-center gap-2 px-6 py-2.5 rounded-md text-xs font-bold uppercase tracking-wider transition-all text-slate-500 hover:text-primary';
      absentBtn.className = 'absent-btn-' + studentId + ' flex items-center gap-2 px-6 py-2.5 rounded-md text-xs font-bold uppercase tracking-wider transition-all bg-error text-white shadow-sm';
    }
    updateCounter();
  }

  // Update counter
  function updateCounter() {
    const marked = Object.keys(attendanceMap).length;
    const total = studentList.length;
    const present = Object.values(attendanceMap).filter(s => s === 'present').length;
    const absent = Object.values(attendanceMap).filter(s => s === 'absent').length;
    recordedCount.textContent = marked;
    totalCount.textContent = total;
    presentCount.textContent = present;
    absentCount.textContent = absent;
  }

  // Display completion summary with student attendance details
  function showCompletionSummary() {
    completionDetails.innerHTML = '';
    studentList.forEach(student => {
      const percentage = studentAttendancePercentage[student._id] !== undefined ? studentAttendancePercentage[student._id] : 0;
      const status = attendanceMap[student._id] || 'absent';
      const initials = (student.name || 'U').split(' ').map(n => n[0]).join('').toUpperCase();
      const statusBadge = status === 'present' 
        ? '<span class="inline-flex items-center px-3 py-1 rounded-full text-[10px] font-black bg-primary/10 text-primary uppercase border border-primary/20">Present</span>'
        : '<span class="inline-flex items-center px-3 py-1 rounded-full text-[10px] font-black bg-error/10 text-error uppercase border border-error/20">Absent</span>';
      
      const detail = document.createElement('div');
      detail.className = 'p-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4 hover:bg-slate-50/50 transition-colors';
      detail.innerHTML = `
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold">${initials}</div>
          <div>
            <h4 class="font-bold text-on-surface">${student.name}</h4>
            <p class="text-sm text-slate-500 font-medium">ID: ${student.studentId || 'N/A'}</p>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <div class="text-right">
            <div class="text-sm font-bold text-on-surface">${percentage}% Attendance</div>
          </div>
          ${statusBadge}
        </div>
      `;
      completionDetails.appendChild(detail);
    });
    
    // Show the completion summary section
    completionSummary.classList.remove('hidden');
    
    // Scroll to completion summary
    setTimeout(() => {
      completionSummary.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 300);
  }

  // Event listeners
  branchSelect.addEventListener('change', function() {
    currentBranch = this.value;
    attendanceCompleted = false;
    completeRegistryBtn.disabled = false;
    completeRegistryBtn.style.opacity = '1';
    completeRegistryBtn.style.cursor = 'pointer';
    if (currentBranch) loadStudents();
  });

  markAllPresentBtn.addEventListener('click', function() {
    studentList.forEach(student => markStudent(student._id, 'present'));
  });

  completeRegistryBtn.addEventListener('click', async function() {
    console.log('Complete Registry clicked, attendanceCompleted:', attendanceCompleted, 'studentList:', studentList.length);
    if (attendanceCompleted) {
      showToast('Attendance already completed for ' + currentBranch + ' branch today', 'error');
      return;
    }
    if (studentList.length === 0) {
      showToast('No students available', 'error');
      return;
    }
    try {
      completeRegistryBtn.disabled = true;
      const records = studentList.map(s => ({
        student: s._id,
        status: attendanceMap[s._id] || 'absent'
      }));
      console.log('Sending attendance records:', records);
      const response = await window.API.attendance.recordByBranch(currentBranch, records);
      console.log('API response:', response);
      showToast('✓ Attendance recorded successfully for ' + currentBranch + ' branch!', 'success');
      attendanceCompleted = true;
      
      // Hide marking section
      const markingSection = document.getElementById('marking-section');
      if (markingSection) markingSection.style.display = 'none';
      const submissionFooter = document.getElementById('submission-footer');
      if (submissionFooter) submissionFooter.style.display = 'none';
      studentsList.innerHTML = '';
      
      // Show completion summary
      showCompletionSummary();
    } catch (error) {
      console.error('Error in complete registry:', error);
      showToast(error.message || 'Failed to record attendance', 'error');
      completeRegistryBtn.disabled = false;
    }
  });

  logoutBtn.addEventListener('click', function() {
    window.API.logout();
  });

  discardDraftBtn.addEventListener('click', function() {
    // Confirm before discarding
    if (!confirm('Are you sure you want to discard the current attendance draft? This cannot be undone.')) {
      return;
    }
    // Clear attendance data
    attendanceMap = {};
    // Reset UI
    updateCounter();
    renderStudents(studentList);
    completeRegistryBtn.disabled = false;
    completeRegistryBtn.style.opacity = '1';
    completeRegistryBtn.style.cursor = 'pointer';
    // Reset branch selection
    branchSelect.value = '';
    currentBranch = null;
    attendanceCompleted = false;
    // Hide completion summary
    completionSummary.classList.add('hidden');
    // Show marking section and submission footer
    const markingSection = document.getElementById('marking-section');
    if (markingSection) markingSection.style.display = 'block';
    const submissionFooter = document.getElementById('submission-footer');
    if (submissionFooter) submissionFooter.style.display = 'flex';
    showToast('Draft discarded successfully', 'success');
  });

  function showToast(message, type = 'success') {
    toast.textContent = message;
    toast.className = 'fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white font-semibold ' + 
      (type === 'success' ? 'bg-green-600' : 'bg-red-600');
    setTimeout(() => {
      toast.classList.add('hidden');
    }, 3000);
  }

  // Debug function to test branch loading
  window.debugBranchLoad = async function(branch) {
    try {
      console.log('Testing branch load for:', branch);
      const allUsers = await window.API.users.getAll();
      console.log('All users:', allUsers);
      const filtered = allUsers.filter(u => u.role === 'student' && u.department === branch);
      console.log(`Students in ${branch}:`, filtered);
      return filtered;
    } catch (error) {
      console.error('Debug error:', error);
    }
  };

  // Debug: Check attendance for a branch
  window.debugCheckAttendance = async function(branch) {
    try {
      const result = await window.API.call('/attendance/check-branch/' + branch, 'GET');
      console.log('Attendance check result:', result);
      return result;
    } catch (error) {
      console.error('Debug error:', error);
    }
  };

  // Debug: Get student attendance history
  window.debugStudentAttendance = async function(studentId) {
    try {
      const result = await window.API.call('/attendance/student/' + studentId, 'GET');
      console.log('Student attendance history:', result);
      return result;
    } catch (error) {
      console.error('Debug error:', error);
    }
  };

  // Initialize
  loadStudents();
});
</script>
</body>
